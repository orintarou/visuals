<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>k-uma — Work Visuals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #fdfcfb;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ── VIEWS ── */
    .view {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #fdfcfb;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .view.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(14px);
    }

    /* ── LANDING ── */
    .page-title {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #c8c6c0;
      white-space: nowrap;
      z-index: 20;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
    }

    svg.lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .search-center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 10;
    }

    .search-box {
      width: 148px;
      height: 32px;
      border: 0.5px solid #d4d2cb;
      background: #fdfcfb;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .search-box span {
      font-size: 10px;
      color: #c8c6c0;
      letter-spacing: 0.1em;
    }

    .search-icon {
      width: 11px;
      height: 11px;
      border: 1px solid #c8c6c0;
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }
    .search-icon::after {
      content: '';
      position: absolute;
      bottom: -4px; right: -4px;
      width: 4px; height: 1px;
      background: #c8c6c0;
      transform: rotate(45deg);
      transform-origin: left center;
    }

    .search-hint {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #d4d2cb;
    }

    .project-label {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }

    .project-label .pill {
      padding: 5px 13px;
      border: 0.5px solid #c8c6c0;
      background: #fdfcfb;
      border-radius: 2px;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: #6a6864;
      font-family: 'DM Mono', monospace;
      white-space: nowrap;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
      position: relative;
    }

    .project-label.featured .pill {
      border-color: #8a8884;
      color: #3a3836;
    }

    .project-label.active .pill,
    .project-label:hover .pill {
      background: #2a2825;
      border-color: #2a2825;
      color: #fdfcfb;
    }

    .featured-dot {
      position: absolute;
      top: -3px; right: -3px;
      width: 5px; height: 5px;
      background: #3a3836;
      border-radius: 50%;
    }

    .project-label.active .featured-dot,
    .project-label:hover .featured-dot {
      background: #fdfcfb;
      border: 1px solid #3a3836;
    }

    .connector-line {
      stroke: #b0aea8;
      stroke-width: 0.5;
      opacity: 0;
      transition: opacity 0.22s;
      stroke-dasharray: 2.5 5;
    }
    .connector-line.visible { opacity: 1; }

    .star {
      fill: #8a8884;
      opacity: 0;
      transition: opacity 0.22s;
    }
    .star.visible { opacity: 1; }

    .description-area {
      position: absolute;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      width: 88vw;
      max-width: 420px;
      text-align: center;
      pointer-events: none;
      z-index: 20;
    }

    .description-text {
      font-size: 10px;
      letter-spacing: 0.06em;
      color: #9a9894;
      line-height: 1.8;
      opacity: 0;
      transition: opacity 0.22s;
    }
    .description-text.visible { opacity: 1; }

    .logo-bottom {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 52px;
      opacity: 0.28;
      mix-blend-mode: multiply;
      z-index: 20;
    }

    /* ── PROJECT PAGES ── */
    /*
      All project pages are no-scroll: content is centered vertically
      within the fixed viewport using flex. Heights are controlled by
      --media-h so desktop + mobile always match exactly.
    */
    .project-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 32px;
      overflow: hidden;
    }

    .project-page-inner {
      width: 100%;
      max-width: 920px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .project-name-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9a9894;
    }

    /*
      media-row: both columns share the same explicit height via --media-h.
      Children (img / video) fill that height; width is auto so aspect ratio
      is preserved. The row itself is vertically aligned to the top of the
      shared height box.
    */
    .media-row {
      --media-h: 58vh;
      display: flex;
      align-items: flex-end; /* captions align at bottom */
      justify-content: center;
      gap: 28px;
      width: 100%;
    }

    .media-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* The actual media element fills the shared height */
    .media-col video,
    .media-col img {
      height: var(--media-h, 58vh);
      width: auto;
      max-width: 100%;
      display: block;
      border: 0.5px solid #e0deda;
      border-radius: 3px;
      object-fit: contain;
    }

    /* Freemarkets phone: no border, transparent bg, larger */
    .media-col img.phone-transparent {
      border: none;
      background: transparent;
    }

    .media-caption {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #c8c6c0;
      flex-shrink: 0;
    }

    /* LiquidTalent: single centered doc, fits in viewport */
    .media-single {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .media-single img {
      height: 62vh;
      width: auto;
      max-width: 100%;
      display: block;
      border: 0.5px solid #e0deda;
      border-radius: 3px;
      object-fit: contain;
    }

    /* back button */
    .back-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      color: #6a6864;
      border: 0.5px solid #c8c6c0;
      background: #fdfcfb;
      border-radius: 2px;
      padding: 6px 16px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .back-btn:hover {
      background: #2a2825;
      border-color: #2a2825;
      color: #fdfcfb;
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .project-page { padding: 0 16px; }
      .project-page-inner { gap: 20px; }

      .media-row {
        --media-h: 36vh;
        flex-direction: row; /* keep side by side on mobile too */
        gap: 12px;
      }

      .media-single img { height: 68vh; }

      .project-label .pill { font-size: 9px; padding: 4px 10px; letter-spacing: 0.08em; }
      .search-box { width: 130px; height: 30px; }
      .search-box span { font-size: 9px; }
      .description-text { font-size: 9px; }
      .logo-bottom { width: 42px; }
    }
  </style>
</head>
<body>

  <!-- ── LANDING ── -->
  <div class="view" id="view-landing">
    <div class="page-title">Work Visuals</div>
    <div class="stage" id="stage">
      <svg class="lines" id="svg-lines" xmlns="http://www.w3.org/2000/svg">
        <line id="line-bridgehacs"   class="connector-line" />
        <line id="line-godela"       class="connector-line" />
        <line id="line-freemarkets"  class="connector-line" />
        <line id="line-liquidtalent" class="connector-line" />
        <circle id="star-bridgehacs"   class="star" r="2" />
        <circle id="star-godela"       class="star" r="2" />
        <circle id="star-freemarkets"  class="star" r="2" />
        <circle id="star-liquidtalent" class="star" r="2" />
      </svg>

      <div class="search-center" id="search-center">
        <div class="search-box">
          <div class="search-icon"></div>
          <span>explore work</span>
        </div>
        <div class="search-hint">tap a project</div>
      </div>

      <div class="project-label featured" id="label-godela">
        <div class="pill">Godela<span class="featured-dot"></span></div>
      </div>
      <div class="project-label featured" id="label-bridgehacs">
        <div class="pill">Bridgehacs<span class="featured-dot"></span></div>
      </div>
      <div class="project-label" id="label-liquidtalent">
        <div class="pill">LiquidTalent</div>
      </div>
      <div class="project-label featured" id="label-freemarkets">
        <div class="pill">Freemarkets<span class="featured-dot"></span></div>
      </div>
    </div>
    <div class="description-area">
      <div class="description-text" id="desc-text"></div>
    </div>
    <img class="logo-bottom" src="k_uma_logo_white-background.png" alt="k-uma" />
  </div>

  <!-- ── BRIDGEHACS ── -->
  <div class="view hidden project-page" id="view-bridgehacs">
    <div class="project-page-inner">
      <div class="media-row">
        <div class="media-col">
          <video autoplay muted loop playsinline>
            <source src="Work_Visuals__Bridgehacs_desktop_video_.mov" type="video/mp4" />
          </video>
          <span class="media-caption">Desktop</span>
        </div>
        <div class="media-col">
          <img src="Work_Visuals__Bridgehacs_Mobile_.jpeg" alt="Bridgehacs mobile" />
          <span class="media-caption">Mobile</span>
        </div>
      </div>
      <div class="project-name-label">Bridgehacs</div>
      <button class="back-btn" onclick="showView('view-landing')">Back to Home</button>
    </div>
  </div>

  <!-- ── GODELA ── -->
  <div class="view hidden project-page" id="view-godela">
    <div class="project-page-inner">
      <div class="media-row">
        <div class="media-col">
          <img src="Work_Visuals__Godela_Desktop_.png" alt="Godela desktop" />
          <span class="media-caption">Desktop</span>
        </div>
        <div class="media-col">
          <img src="Work_Visuals__Godela_Mobile_.PNG" alt="Godela mobile" />
          <span class="media-caption">Mobile</span>
        </div>
      </div>
      <div class="project-name-label">Godela</div>
      <button class="back-btn" onclick="showView('view-landing')">Back to Home</button>
    </div>
  </div>

  <!-- ── FREEMARKETS ── -->
  <div class="view hidden project-page" id="view-freemarkets">
    <div class="project-page-inner">
      <div class="media-row">
        <div class="media-col">
          <img src="freemarkets_letter.png" alt="Freemarkets reference letter" />
          <span class="media-caption">Reference</span>
        </div>
        <div class="media-col">
          <img src="freemarkets_phone_transparent.png" alt="Freemarkets mobile" class="phone-transparent" />
          <span class="media-caption">Mobile</span>
        </div>
      </div>
      <div class="project-name-label">Freemarkets</div>
      <button class="back-btn" onclick="showView('view-landing')">Back to Home</button>
    </div>
  </div>

  <!-- ── LIQUIDTALENT ── -->
  <div class="view hidden project-page" id="view-liquidtalent">
    <div class="project-page-inner">
      <div class="media-single">
        <img src="liquidtalent_letter.png" alt="LiquidTalent reference letter" />
        <span class="media-caption">Reference — Alex Abelin, CEO</span>
      </div>
      <div class="project-name-label">LiquidTalent</div>
      <button class="back-btn" onclick="showView('view-landing')">Back to Home</button>
    </div>
  </div>

  <script>
    const projects = {
      godela:       { desc: "Brand identity and interface design for a modern digital-first product experience." },
      bridgehacs:   { desc: "UI/UX design for a platform bridging creative professionals with niche opportunities." },
      liquidtalent: { desc: "Flexible workforce platform UI — connecting companies with on-demand talent pools." },
      freemarkets:  { desc: "End-to-end product design for a peer-to-peer marketplace enabling direct trade." }
    };

    const isMobile = () => window.innerWidth <= 600;

    function showView(id) {
      document.querySelectorAll('.view').forEach(v => {
        v.classList.toggle('hidden', v.id !== id);
      });
    }

    function placeLabels() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const cx = vw / 2;
      const cy = vh / 2;

      const colSpread = isMobile() ? 0.27 : 0.224;
      const rowSpread = isMobile() ? 0.18 : 0.14;

      const colL = -vw * colSpread;
      const colR =  vw * colSpread;
      const rowT = -vh * (rowSpread * 1.5);
      const rowB =  vh * rowSpread;

      const positions = {
        godela:       { x: cx,        y: cy + rowT },
        bridgehacs:   { x: cx + colL, y: cy },
        liquidtalent: { x: cx + colL, y: cy + rowB },
        freemarkets:  { x: cx + colR, y: cy + rowB }
      };

      Object.entries(positions).forEach(([key, pos]) => {
        const el = document.getElementById('label-' + key);
        el.style.left = pos.x + 'px';
        el.style.top  = pos.y + 'px';
      });

      return positions;
    }

    function getElCenter(el) {
      const r = el.getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }

    function initLines(positions) {
      const sc = document.getElementById('search-center');
      const center = getElCenter(sc);
      Object.keys(projects).forEach(key => {
        const pos = positions[key];
        const line = document.getElementById('line-' + key);
        line.setAttribute('x1', center.x); line.setAttribute('y1', center.y);
        line.setAttribute('x2', pos.x);    line.setAttribute('y2', pos.y);
        const star = document.getElementById('star-' + key);
        star.setAttribute('cx', (center.x + pos.x) / 2);
        star.setAttribute('cy', (center.y + pos.y) / 2);
      });
    }

    let activeKey = null;

    function activate(key) {
      if (activeKey) {
        document.getElementById('label-' + activeKey).classList.remove('active');
        document.getElementById('line-' + activeKey).classList.remove('visible');
        document.getElementById('star-' + activeKey).classList.remove('visible');
      }
      activeKey = key;
      const desc = document.getElementById('desc-text');
      if (key) {
        document.getElementById('label-' + key).classList.add('active');
        document.getElementById('line-' + key).classList.add('visible');
        document.getElementById('star-' + key).classList.add('visible');
        desc.textContent = projects[key].desc;
        desc.classList.add('visible');
      } else {
        desc.classList.remove('visible');
      }
    }

    let positions = placeLabels();
    setTimeout(() => initLines(positions), 50);

    Object.keys(projects).forEach(key => {
      const label = document.getElementById('label-' + key);
      label.addEventListener('mouseenter', () => activate(key));
      label.addEventListener('mouseleave', () => activate(null));
      label.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (activeKey === key) {
          showView('view-' + key);
        } else {
          activate(key);
        }
      });
      label.addEventListener('click', () => showView('view-' + key));
    });

    document.getElementById('stage').addEventListener('touchend', (e) => {
      if (e.target === document.getElementById('stage')) activate(null);
    });

    window.addEventListener('resize', () => {
      positions = placeLabels();
      initLines(positions);
    });
  </script>
</body>
</html>
